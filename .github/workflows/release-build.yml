name: Release Build

on:
  push:
    branches:
      - main
      - master
      - 'release-*'

permissions:
  contents: write

concurrency:
  group: release-build-${{ github.ref }}
  cancel-in-progress: true

env:
  APP_NAME: post-mcp
  PRODUCT_NAME: PostMCP
  GO_VERSION: '1.25.0'
  NODE_VERSION: '24'
  PNPM_VERSION: '9'
  WAILS_VERSION: 'v2.11.0'
  NODE_OPTIONS: '--max-old-space-size=4096'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  GIT_TERMINAL_PROMPT: '0'
  GOPROXY: 'https://proxy.golang.org,direct'
  GOSUMDB: 'sum.golang.org'
  GOPRIVATE: ''
  GONOSUMDB: ''

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.meta.outputs.release_tag }}
      release_name: ${{ steps.meta.outputs.release_name }}
      release_notes: ${{ steps.meta.outputs.release_notes }}
      package_version: ${{ steps.meta.outputs.package_version }}
      package_release: ${{ steps.meta.outputs.package_release }}
    steps:
      - name: Prepare release metadata
        id: meta
        shell: bash
        run: |
          branch="${GITHUB_REF_NAME}"
          short_sha="${GITHUB_SHA::7}"

          if [[ "$branch" == "main" || "$branch" == "master" ]]; then
            release_tag="latest"
            release_name="latest"
            package_version="0.0.0"
            package_release="${GITHUB_RUN_NUMBER}"
            release_notes="Automated latest build for branch ${branch} at commit ${short_sha}."
          else
            version="${branch#release-}"
            sanitized_version="${version#v}"

            if [[ -z "$version" ]]; then
              echo "Unable to parse version from branch: $branch" >&2
              exit 1
            fi

            release_tag="$version"
            release_name="Version $version"
            package_version="${sanitized_version}"
            package_release="1"
            release_notes="Automated release build for branch ${branch} at commit ${short_sha}."
          fi

          {
            echo "release_tag=$release_tag"
            echo "release_name=$release_name"
            echo "package_version=$package_version"
            echo "package_release=$package_release"
            echo "release_notes<<EOF"
            printf '%s\n' "$release_notes"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

  windows:
    needs: prepare
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Enable pnpm
        shell: pwsh
        run: |
          corepack enable
          corepack prepare pnpm@${{ env.PNPM_VERSION }} --activate
          pnpm --version

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: go.sum

      - name: Add Go bin to PATH
        shell: pwsh
        run: |
          "$(go env GOPATH)\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Install NSIS
        shell: pwsh
        run: choco install nsis --no-progress -y

      - name: Install Wails CLI
        shell: pwsh
        run: go install github.com/wailsapp/wails/v2/cmd/wails@${{ env.WAILS_VERSION }}

      - name: Install frontend dependencies
        shell: pwsh
        run: pnpm install --frozen-lockfile
        working-directory: frontend

      - name: Build frontend
        shell: pwsh
        run: pnpm build
        working-directory: frontend

      - name: Build Windows artifacts
        shell: pwsh
        run: |
          wails build -clean -platform windows/amd64 -webview2 download -o ${{ env.APP_NAME }}

      - name: Collect Windows artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release-assets | Out-Null
          $binary = Get-ChildItem -Path build/bin -File | Where-Object {
            $_.BaseName -eq '${{ env.APP_NAME }}' -or $_.Name -eq '${{ env.APP_NAME }}'
          } | Select-Object -First 1

          if (-not $binary) {
            Write-Error "Windows build output not found in build/bin"
            Get-ChildItem -Path build/bin -Force | Format-Table -AutoSize | Out-String | Write-Host
            exit 1
          }

          Copy-Item $binary.FullName "release-assets/${{ env.APP_NAME }}-windows-amd64$($binary.Extension)"

          $installer = Get-ChildItem -Path build/bin -Filter "*-installer.exe" | Select-Object -First 1
          if ($installer) {
            Copy-Item $installer.FullName "release-assets/${{ env.APP_NAME }}-windows-amd64-installer.exe"
          }

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v6
        with:
          name: release-windows
          path: release-assets/*
          if-no-files-found: error

  macos:
    needs: prepare
    runs-on: macos-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Enable pnpm
        shell: bash
        run: |
          corepack enable
          corepack prepare pnpm@${PNPM_VERSION} --activate
          pnpm --version

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: go.sum

      - name: Add Go bin to PATH
        shell: bash
        run: echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Install Wails CLI
        shell: bash
        run: go install github.com/wailsapp/wails/v2/cmd/wails@${{ env.WAILS_VERSION }}

      - name: Install frontend dependencies
        shell: bash
        run: pnpm install --frozen-lockfile
        working-directory: frontend

      - name: Build frontend
        shell: bash
        run: pnpm build
        working-directory: frontend

      - name: Build macOS app bundle
        shell: bash
        run: |
          wails build -clean -platform darwin/universal -o "${APP_NAME}"

      - name: Build DMG
        shell: bash
        run: |
          mkdir -p release-assets/dmg-src
          cp -R "build/bin/${APP_NAME}.app" "release-assets/dmg-src/${PRODUCT_NAME}.app"
          hdiutil create -volname "${PRODUCT_NAME}" -srcfolder release-assets/dmg-src -ov -format UDZO "release-assets/${APP_NAME}-macos-universal.dmg"

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v6
        with:
          name: release-macos
          path: release-assets/*.dmg
          if-no-files-found: error

  linux:
    needs: prepare
    runs-on: ubuntu-22.04
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Linux build dependencies
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev libayatana-appindicator3-dev librsvg2-dev rpm fakeroot

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Enable pnpm
        shell: bash
        run: |
          corepack enable
          corepack prepare pnpm@${PNPM_VERSION} --activate
          pnpm --version

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: go.sum

      - name: Add Go bin to PATH
        shell: bash
        run: echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Install Wails CLI and nfpm
        shell: bash
        run: |
          go install github.com/wailsapp/wails/v2/cmd/wails@${WAILS_VERSION}
          go install github.com/goreleaser/nfpm/v2/cmd/nfpm@latest

      - name: Install frontend dependencies
        shell: bash
        run: pnpm install --frozen-lockfile
        working-directory: frontend

      - name: Build frontend
        shell: bash
        run: pnpm build
        working-directory: frontend

      - name: Build Linux binary
        shell: bash
        run: |
          wails build -clean -platform linux/amd64 -o "${APP_NAME}"

      - name: Package Linux artifacts
        shell: bash
        env:
          PACKAGE_VERSION: ${{ needs.prepare.outputs.package_version }}
          PACKAGE_RELEASE: ${{ needs.prepare.outputs.package_release }}
        run: |
          mkdir -p release-assets/rootfs/usr/local/bin
          mkdir -p release-assets/rootfs/usr/share/applications
          mkdir -p release-assets/rootfs/usr/share/icons/hicolor/512x512/apps

          cp "build/bin/${APP_NAME}" "release-assets/rootfs/usr/local/bin/${APP_NAME}"
          cp build/appicon.png "release-assets/rootfs/usr/share/icons/hicolor/512x512/apps/${APP_NAME}.png"

          cat > release-assets/rootfs/usr/share/applications/${APP_NAME}.desktop <<EOF
          [Desktop Entry]
          Name=${PRODUCT_NAME}
          Exec=/usr/local/bin/${APP_NAME}
          Icon=${APP_NAME}
          Terminal=false
          Type=Application
          Categories=Development;
          EOF

          cat > release-assets/nfpm.yaml <<EOF
          name: ${APP_NAME}
          arch: amd64
          platform: linux
          version: ${PACKAGE_VERSION}
          release: ${PACKAGE_RELEASE}
          section: default
          priority: optional
          maintainer: Star
          description: PostMCP desktop application
          homepage: https://github.com/${GITHUB_REPOSITORY}
          contents:
            - src: ./release-assets/rootfs/usr/local/bin/${APP_NAME}
              dst: /usr/local/bin/${APP_NAME}
              file_info:
                mode: 0755
            - src: ./release-assets/rootfs/usr/share/applications/${APP_NAME}.desktop
              dst: /usr/share/applications/${APP_NAME}.desktop
            - src: ./release-assets/rootfs/usr/share/icons/hicolor/512x512/apps/${APP_NAME}.png
              dst: /usr/share/icons/hicolor/512x512/apps/${APP_NAME}.png
          EOF

          cp "build/bin/${APP_NAME}" "release-assets/${APP_NAME}-linux-amd64"
          tar -C build/bin -czf "release-assets/${APP_NAME}-linux-amd64.tar.gz" "${APP_NAME}"
          nfpm package --packager deb --config release-assets/nfpm.yaml --target "release-assets/${APP_NAME}-linux-amd64.deb"
          nfpm package --packager rpm --config release-assets/nfpm.yaml --target "release-assets/${APP_NAME}-linux-amd64.rpm"

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v6
        with:
          name: release-linux
          path: |
            release-assets/${{ env.APP_NAME }}-linux-amd64
            release-assets/${{ env.APP_NAME }}-linux-amd64.tar.gz
            release-assets/${{ env.APP_NAME }}-linux-amd64.deb
            release-assets/${{ env.APP_NAME }}-linux-amd64.rpm
          if-no-files-found: error

  publish:
    needs:
      - prepare
      - windows
      - macos
      - linux
    if: ${{ always() && needs.windows.result == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download build artifacts
        uses: actions/download-artifact@v6
        with:
          pattern: release-*
          path: release-assets
          merge-multiple: true

      - name: Recreate GitHub release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.prepare.outputs.release_tag }}
          RELEASE_NAME: ${{ needs.prepare.outputs.release_name }}
          RELEASE_NOTES: ${{ needs.prepare.outputs.release_notes }}
        run: |
          shopt -s nullglob
          files=(release-assets/*)

          if [[ ${#files[@]} -eq 0 ]]; then
            echo "No release assets were produced." >&2
            exit 1
          fi

          gh release delete "$RELEASE_TAG" --cleanup-tag --yes || true
          gh api -X DELETE "repos/${GITHUB_REPOSITORY}/git/refs/tags/${RELEASE_TAG}" || true
          gh release create "$RELEASE_TAG" "${files[@]}" \
            --target "$GITHUB_SHA" \
            --title "$RELEASE_NAME" \
            --notes "$RELEASE_NOTES"
